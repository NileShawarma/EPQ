<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WORDLE</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <script type="text/javascript" src="wordle.js?v=1" defer></script>
  <script type="text/javascript" src="../API_Module.js" defer></script>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    Hello there
  </div>
</div>
<div class="shell">

  <header>
    <div class="logo">
      <span>W</span>
      <span>O</span>
      <span>R</span>
      <span>D</span>
      <span>L</span>
      <span>E</span>
    </div>
    <div class="tagline">Guess the hidden word before your tries run <span>out!</span></div>
    <p class="username">USERNAME:</p><input class="username-input" id="username" placeholder="e.g. 21mirzoz">
    <div class="warning" id="warning">
    </div>
    <div class="tagline">// Note, the username should be your school username</div>
  </header>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-val accent" id="timer">0s</div>
      <div class="hud-label">Time</div>
    </div>
    <div class="hud-item">
      <div class="hud-val" id="steps">0</div>
      <div class="hud-label">Guesses</div>
    </div>
    <div class="hud-item">
      <div class="hud-val" id="size-disp">5</div>
      <div class="hud-label">Letters</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="maze-canvas"></canvas>
  </div>

  <div class="msg-line" id="msg"></div>

  <div class="controls">
    <select id="size-sel">
      <option value="4">4 Letters</option>
      <option value="5" selected>5 Letters</option>
      <option value="6">6 Letters</option>
    </select>
    <button class="btn primary" id="new-btn">[ NEW WORD ]</button>
  </div>

  <div class="key-pad">
    <button id="DEL">[ DEL ]</button>
    <button id="ENT">[ ENTER ]</button>
  </div>

  <footer>Type letters to fill the row . Backspace to delete . Enter to <span>guess</span></footer>

</div>
</body>
</html>
