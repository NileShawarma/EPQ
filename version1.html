<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAZE</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <script type="text/javascript" src="maze.js" defer></script>
</head>
<body>

<div class="shell">

  <header>
    <div class="logo"><span>M</span><span>A</span><span>Z</span><span>E</span></div>
    <div class="tagline">// Move the character and find THE <span>EXIT</span></div>
  </header>

  <div class="hud">
    <div class="hud-item">
      <div class="hud-val accent" id="timer">0s</div>
      <div class="hud-label">Time</div>
    </div>
    <div class="hud-item">
      <div class="hud-val" id="steps">0</div>
      <div class="hud-label">Steps</div>
    </div>
    <div class="hud-item">
      <div class="hud-val" id="size-disp">15×15</div>
      <div class="hud-label">Grid</div>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="maze-canvas"></canvas>
  </div>

  <div class="msg-line" id="msg"></div>

  <div class="controls">
    <select id="size-sel">
      <option value="11">Small — 11×11</option>
      <option value="15" selected>Medium — 15×15</option>
      <option value="21">Large — 21×21</option>
      <option value="31">XL — 31×31</option>
    </select>
    <button class="btn primary" id="new-btn">[ NEW MAZE ]</button>
  </div>

  <div class="arrow-pad">
    <div></div>
    <button id="N">↑</button>
    <div></div>
    <button id="W">←</button>
    <button id="S">↓</button>
    <button id="E">→</button>
  </div>

  <footer>WASD or arrow keys to move &nbsp;·&nbsp; reach the cyan marker to escape</footer>

</div>
